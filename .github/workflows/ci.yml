name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://lrggkiseegofvcygmlhq.supabase.co
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_Rxg2SwXp3IBERz0385eybg_hlEc6FNy
        run: npm run typecheck

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        env:
          EXPO_PUBLIC_E2E_BYPASS_AUTH: "true"
          EXPO_PUBLIC_SUPABASE_URL: https://lrggkiseegofvcygmlhq.supabase.co
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_Rxg2SwXp3IBERz0385eybg_hlEc6FNy
        run: npm run test:e2e
