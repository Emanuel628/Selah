<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selah — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/forgot-password.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fa-solid fa-seedling logo-icon"></i>
                <span>Selah</span>
            </div>
            
            <div class="auth-header">
                <h2>Recover your peace</h2>
                <p>Enter your email to receive password reset instructions.</p>
            </div>

            <form onsubmit="return false;">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-field">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <a href="login.html" class="auth-btn">Send Reset Link</a>
            </form>

            <div class="auth-footer">
                <p><a href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a></p>
            </div>
        </div>
    </div>

</body>
</html>
