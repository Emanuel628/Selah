<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selah — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Brand Logo -->
            <div class="auth-logo">
                <i class="fa-solid fa-seedling logo-icon"></i>
                <span>Selah</span>
            </div>
            
            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Continue your cultivation in the word.</p>
            </div>

            <!-- Form (Static links for navigation) -->
            <form onsubmit="return false;">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-field">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-wrapper">
                        <label for="password">Password</label>
                        <a href="forgot-password.html" class="forgot-link">Forgot?</a>
                    </div>
                    <div class="input-field">
                        <i class="fa-regular fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Simulating login action straight to the workspace -->
                <a href="../../index.html" class="auth-btn">Sign In</a>
            </form>

            <div class="auth-footer">
                <p>New to Selah? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </div>

</body>
</html>
