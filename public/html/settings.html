<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Selah — Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
    <div class="mobile-viewport">
        <header class="mobile-header">
            <div class="header-left"><i class="fa-solid fa-seedling logo-icon"></i> <span class="app-title">Selah</span></div>
            <div class="header-center"><span class="current-location">Settings</span></div>
            <div class="header-right"><div class="avatar-badge">J</div></div>
        </header>

        <main class="scripture-canvas">
            <div class="settings-section-title">Account</div>
            <div class="settings-list-group">
                <a href="subscription.html" class="settings-item-row">
                    <div class="item-meta-left"><i class="fa-solid fa-star" style="color: var(--accent-gold);"></i> Subscription</div>
                    <span class="item-value-right" style="color: var(--accent-green);">Pro Active <i class="fa-solid fa-chevron-right"></i></span>
                </a>
            </div>

            <div class="settings-section-title">Appearance</div>
            <div class="settings-list-group">
                <div class="settings-item-row">
                    <div class="item-meta-left"><i class="fa-solid fa-moon"></i> Dark Mode</div>
                    <label class="form-switch"><input type="checkbox" checked><span class="slider-knob"></span></label>
                </div>
                <div class="settings-item-row">
                    <div class="item-meta-left"><i class="fa-solid fa-palette"></i> Reading Theme</div>
                    <span class="item-value-right">Sepia <i class="fa-solid fa-chevron-right"></i></span>
                </div>
            </div>

            <div class="settings-section-title">Reader Settings</div>
            <div class="settings-list-group">
                <div class="settings-item-row">
                    <div class="item-meta-left"><i class="fa-solid fa-quote-left"></i> Red Lettering</div>
                    <label class="form-switch"><input type="checkbox" checked><span class="slider-knob"></span></label>
                </div>
                <div class="settings-item-row">
                    <div class="item-meta-left"><i class="fa-solid fa-list-ol"></i> Show Verse Numbers</div>
                    <label class="form-switch"><input type="checkbox" checked><span class="slider-knob"></span></label>
                </div>
            </div>

            <div class="settings-section-title">Privacy & Security</div>
            <div class="settings-list-group">
                <div class="settings-item-row">
                    <div class="item-meta-left"><i class="fa-solid fa-fingerprint"></i> Biometric Lock</div>
                    <label class="form-switch"><input type="checkbox"><span class="slider-knob"></span></label>
                </div>
                <div class="settings-item-row">
                    <div class="item-meta-left"><i class="fa-solid fa-bell"></i> Daily Reminders</div>
                    <span class="item-value-right">8:00 AM <i class="fa-solid fa-chevron-right"></i></span>
                </div>
            </div>

            <div style="margin-top: 24px; padding: 0 16px;">
                <button style="width: 100%; padding: 14px; background: rgba(234, 133, 133, 0.05); border: 1px solid rgba(234, 133, 133, 0.1); color: #ea8585; border-radius: 12px; font-weight: 600; cursor: pointer;">Sign Out</button>
            </div>
        </main>
        <nav class="mobile-tab-bar">
            <a href="../../index.html" class="tab-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon-svg"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                <span>Read</span>
            </a>
            <a href="garden.html" class="tab-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon-svg"><path d="M12 22V12"></path><path d="M12 12c0-4.42 3.58-8 8-8"></path><path d="M12 15c0-3.87-3.13-7-7-7"></path><circle cx="20" cy="4" r="1.5" fill="currentColor"></circle><circle cx="5" cy="8" r="1.5" fill="currentColor"></circle></svg>
                <span>Garden</span>
            </a>
            <a href="search.html" class="tab-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon-svg"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <span>Search</span>
            </a>
            <a href="settings.html" class="tab-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="tab-icon-svg"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
                <span>Settings</span>
            </a>
        </nav>
    </div>
</body>
</html>
