<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selah — Check Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth-verify.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="auth-logo">
                <i class="fa-solid fa-seedling logo-icon"></i>
                <span>Selah</span>
            </div>
            
            <div class="verify-icon-container">
                <div class="icon-pulse"></div>
                <i class="fa-regular fa-envelope-open"></i>
            </div>

            <div class="auth-header">
                <h2>Check your email</h2>
                <p>We have sent a secure link to your inbox. Click the verification link inside to safely activate your account.</p>
            </div>

            <div class="action-block">
                <a href="login.html" class="auth-btn">Return to Sign In</a>
            </div>

            <div class="auth-footer">
                <p>Didn't receive the email? <a href="#" class="resend-link">Resend link</a></p>
            </div>
            
        </div>
    </div>

</body>
</html>
